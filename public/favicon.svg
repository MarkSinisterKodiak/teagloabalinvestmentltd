<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f0f0" />
    </linearGradient>
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- Main hexagon/shield background -->
  <path d="M32 2 L58 16 L58 48 L32 62 L6 48 L6 16 Z" fill="url(#bgGradient)" />

  <!-- Inner border -->
  <path d="M32 6 L54 18 L54 46 L32 58 L10 46 L10 18 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />

  <!-- Speed lines -->
  <line x1="10" y1="28" x2="22" y2="28" stroke="url(#speedGradient)" stroke-width="2" stroke-linecap="round" />
  <line x1="8" y1="32" x2="20" y2="32" stroke="url(#speedGradient)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="10" y1="36" x2="22" y2="36" stroke="url(#speedGradient)" stroke-width="2" stroke-linecap="round" />

  <!-- Truck body - cab -->
  <rect x="22" y="26" width="12" height="12" rx="2" fill="url(#truckGradient)" />

  <!-- Truck body - cargo container -->
  <rect x="34" y="24" width="18" height="14" rx="2" fill="url(#truckGradient)" />

  <!-- Cab window -->
  <rect x="24" y="28" width="8" height="5" rx="1" fill="#0ea5e9" opacity="0.8" />

  <!-- Container detail -->
  <line x1="40" y1="26" x2="40" y2="36" stroke="#cbd5e1" stroke-width="1" />
  <line x1="46" y1="26" x2="46" y2="36" stroke="#cbd5e1" stroke-width="1" />

  <!-- Wheels -->
  <circle cx="28" cy="40" r="4" fill="#1e293b" />
  <circle cx="28" cy="40" r="2" fill="#475569" />
  <circle cx="44" cy="40" r="4" fill="#1e293b" />
  <circle cx="44" cy="40" r="2" fill="#475569" />

  <!-- Road line -->
  <line x1="16" y1="45" x2="52" y2="45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 2" />

  <!-- Swift arrow -->
  <path d="M50 20 L56 24 L50 28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
</svg>
